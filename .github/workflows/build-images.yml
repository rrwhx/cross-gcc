name: Build BusyBox & Kernel Images

on:
  push:
    branches: [main, master]
    paths:
      - 'build-busybox.sh'
      - 'build-kernel.sh'
      - 'lib.sh'
      - '.github/workflows/build-images.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-images:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            target: riscv64-linux-gnu
          - arch: aarch64
            target: aarch64-linux-gnu
          - arch: x86_64
            target: x86_64-linux-gnu
          - arch: loongarch64
            target: loongarch64-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          ./install-prerequisites.sh

      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v6
        with:
          path: cross-${{ matrix.target }}
          key: toolchain-${{ matrix.arch }}-${{ hashFiles('build-toolchain-generic.sh', 'lib.sh', 'prepare-gcc.sh') }}

      - name: Build toolchain (if not cached)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          ./build-toolchain-generic.sh \
            --arch ${{ matrix.arch }} --libc glibc --clean

      - name: Resolve build versions
        run: |
          # 内核：取 kernel.org 最新稳定发布版（仅拉取版本号 JSON，非执行远程脚本）
          LINUX_VER=$(curl -sSL --retry 3 https://www.kernel.org/releases.json | jq -r '.latest_stable.version')
          if [ -z "$LINUX_VER" ] || [ "$LINUX_VER" = "null" ]; then
            echo "::error::无法获取最新稳定内核版本" >&2
            exit 1
          fi
          # BusyBox：沿用脚本内置默认版本
          BUSYBOX_VER=$(sed -n 's/^BUSYBOX_VER=.*:-\([0-9.]*\)}.*/\1/p' build-busybox.sh)
          [ -z "$BUSYBOX_VER" ] && BUSYBOX_VER=unknown
          echo "LINUX_VER=$LINUX_VER" >> "$GITHUB_ENV"
          echo "BUSYBOX_VER=$BUSYBOX_VER" >> "$GITHUB_ENV"
          echo "内核最新稳定版: $LINUX_VER"
          echo "BusyBox 版本: $BUSYBOX_VER"

      - name: Build BusyBox
        run: |
          ./build-busybox.sh \
            --arch ${{ matrix.arch }} \
            --cross-compile ./cross-${{ matrix.target }}/bin/${{ matrix.target }}-

      - name: Save BusyBox binary and clean
        run: |
          cp build-busybox-${{ matrix.arch }}/busybox busybox-${{ matrix.arch }}
          rm -rf build-busybox-${{ matrix.arch }} logs-busybox-${{ matrix.arch }}

      - name: Build Linux Kernel
        run: |
          ./build-kernel.sh \
            --arch ${{ matrix.arch }} \
            --cross-compile ./cross-${{ matrix.target }}/bin/${{ matrix.target }}- \
            --linux-ver "$LINUX_VER" \
            --clean

      - name: List build artifacts
        run: |
          echo "=== BusyBox binary ==="
          ls -lh busybox-${{ matrix.arch }}
          file busybox-${{ matrix.arch }}
          echo "=== BusyBox initramfs ==="
          ls -lh initrd-${{ matrix.arch }}.cpio
          echo "=== Kernel images ==="
          ls -lh kernel-${{ matrix.arch }}/

      - name: Upload BusyBox binary
        uses: actions/upload-artifact@v7
        with:
          name: busybox-${{ matrix.arch }}
          path: busybox-${{ matrix.arch }}
          retention-days: 7

      - name: Upload BusyBox initramfs
        uses: actions/upload-artifact@v7
        with:
          name: initrd-${{ matrix.arch }}
          path: initrd-${{ matrix.arch }}.cpio
          retention-days: 7

      - name: Upload Kernel images
        uses: actions/upload-artifact@v7
        with:
          name: kernel-${{ matrix.arch }}
          path: kernel-${{ matrix.arch }}/
          retention-days: 7

      - name: Save version info (once)
        if: matrix.arch == 'riscv64'
        run: |
          mkdir -p versioninfo
          printf 'KERNEL_VER=%s\nBUSYBOX_VER=%s\n' "$LINUX_VER" "$BUSYBOX_VER" > versioninfo/versions.txt
          cat versioninfo/versions.txt

      - name: Upload version info (once)
        if: matrix.arch == 'riscv64'
        uses: actions/upload-artifact@v7
        with:
          name: versions
          path: versioninfo/versions.txt
          retention-days: 7

  release:
    needs: build-images
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Load versions
        run: |
          if [ -f artifacts/versions/versions.txt ]; then
            cat artifacts/versions/versions.txt >> "$GITHUB_ENV"
          else
            echo "KERNEL_VER=unknown" >> "$GITHUB_ENV"
            echo "BUSYBOX_VER=unknown" >> "$GITHUB_ENV"
          fi

      - name: Prepare release files
        run: |
          mkdir -p release
          # 版本说明文件（一并纳入 SHA256SUMS）
          {
            echo "Linux kernel : ${KERNEL_VER:-unknown} (最新稳定发布版)"
            echo "BusyBox      : ${BUSYBOX_VER:-unknown}"
            echo "Built (UTC)  : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > release/VERSIONS.txt
          ARCHES="riscv64 aarch64 x86_64 loongarch64"
          KIMGS="vmlinux Image Image.gz bzImage zImage"
          for arch in $ARCHES; do
            bundle="bundle-$arch"
            mkdir -p "$bundle"
            # BusyBox 二进制 -> <arch>-busybox（统一为“架构在前”）
            bb="artifacts/busybox-$arch/busybox-$arch"
            if [ -f "$bb" ]; then
              cp "$bb" "release/${arch}-busybox"
              cp "$bb" "$bundle/busybox"
            fi
            # initramfs -> <arch>-initrd.cpio
            ini="artifacts/initrd-$arch/initrd-$arch.cpio"
            if [ -f "$ini" ]; then
              cp "$ini" "release/${arch}-initrd.cpio"
              cp "$ini" "$bundle/initrd.cpio"
            fi
            # 内核镜像：架构在前，保留原始镜像文件名 -> <arch>-<img>
            kdir="artifacts/kernel-$arch"
            for img in $KIMGS; do
              if [ -f "$kdir/$img" ]; then
                cp "$kdir/$img" "release/${arch}-${img}"
                cp "$kdir/$img" "$bundle/$img"
              fi
            done
            # 每架构整包 tar.gz（包内保留原始文件名）
            if [ -n "$(ls -A "$bundle" 2>/dev/null)" ]; then
              tar -czf "release/${arch}-boot.tar.gz" -C "$bundle" .
            fi
            rm -rf "$bundle"
          done
          # 生成所有文件的 SHA256 校验和
          ( cd release && rm -f SHA256SUMS.txt && sha256sum -- * > SHA256SUMS.txt )
          echo "=== Release files ==="
          ls -lh release/

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-images
          name: "Latest BusyBox & Kernel Images"
          body: |
            ## BusyBox & Kernel Images

            自动构建的 BusyBox initramfs 和 Linux 内核镜像。

            ### 构建版本
            | 组件 | 版本 |
            |------|------|
            | Linux Kernel | `${{ env.KERNEL_VER }}` (最新稳定发布版) |
            | BusyBox | `${{ env.BUSYBOX_VER }}` |

            ### 产物说明（统一“架构在前”命名，同架构文件在列表中相邻）
            | 文件 | 说明 |
            |------|------|
            | `<arch>-boot.tar.gz` | 该架构整包：内核镜像 + initrd.cpio + busybox |
            | `<arch>-busybox` | BusyBox 静态链接二进制 |
            | `<arch>-initrd.cpio` | BusyBox initramfs (cpio 格式) |
            | `<arch>-vmlinux` | 未压缩内核 ELF（调试/部分架构可直接启动） |
            | `<arch>-Image` / `<arch>-Image.gz` | arm64/riscv64 可启动内核镜像 |
            | `<arch>-bzImage` | x86_64 可启动内核镜像 |
            | `SHA256SUMS.txt` | 所有文件的 SHA256 校验和 |
            | `VERSIONS.txt` | 内核与 BusyBox 版本及构建时间 |

            > 每个架构既提供可单独下载的分立文件，也提供 `<arch>-boot.tar.gz` 整包（包内保留原始文件名）。

            ### 支持架构
            riscv64, aarch64, x86_64, loongarch64
          files: release/*
          overwrite_files: true
          make_latest: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
