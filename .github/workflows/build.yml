name: Build Cross-GCC Toolchain

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        include:
          - arch: riscv64
            libc: glibc
          - arch: loongarch64
            libc: glibc
          - arch: aarch64
            libc: glibc
          - arch: x86_64
            libc: glibc
          - arch: riscv32
            libc: glibc
          - arch: riscv64
            libc: musl

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          chmod +x install_prerequest.sh
          ./install_prerequest.sh

      - name: Get latest versions
        id: versions
        run: |
          chmod +x get_latest_versions.sh
          eval "$(./get_latest_versions.sh --shell)"
          echo "gcc_ver=$GCC_VER" >> $GITHUB_OUTPUT
          echo "binutils_ver=$BINUTILS_VER" >> $GITHUB_OUTPUT
          echo "glibc_ver=$GLIBC_VER" >> $GITHUB_OUTPUT
          echo "musl_ver=$MUSL_VER" >> $GITHUB_OUTPUT
          echo "linux_ver=$LINUX_VER" >> $GITHUB_OUTPUT

      - name: Build toolchain
        run: |
          chmod +x build-toolchain-generic.sh
          ./build-toolchain-generic.sh --arch ${{ matrix.arch }} --libc ${{ matrix.libc }} --clean --archive
        env:
          GCC_VER: ${{ steps.versions.outputs.gcc_ver }}
          BINUTILS_VER: ${{ steps.versions.outputs.binutils_ver }}
          GLIBC_VER: ${{ steps.versions.outputs.glibc_ver }}
          MUSL_VER: ${{ steps.versions.outputs.musl_ver }}
          LINUX_VER: ${{ steps.versions.outputs.linux_ver }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.arch }}-${{ matrix.libc }}-toolchain
          path: cross-*.tar.xz
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Get latest versions
        id: versions
        run: |
          chmod +x get_latest_versions.sh
          eval "$(./get_latest_versions.sh --shell)"
          echo "gcc_ver=$GCC_VER" >> $GITHUB_OUTPUT
          echo "binutils_ver=$BINUTILS_VER" >> $GITHUB_OUTPUT
          echo "glibc_ver=$GLIBC_VER" >> $GITHUB_OUTPUT
          echo "musl_ver=$MUSL_VER" >> $GITHUB_OUTPUT
          echo "linux_ver=$LINUX_VER" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: List files
        run: ls -lh artifacts/

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-toolchain
          name: "Latest Toolchain Build"
          body: |
            ## Cross-GCC Toolchain

            🔄 **Auto updated** by commit: ${{ github.sha }}
            📅 **Date**: ${{ github.event.head_commit.timestamp }}

            ## 组件版本
            | 组件 | 版本 |
            |------|------|
            | GCC | ${{ steps.versions.outputs.gcc_ver }} |
            | binutils | ${{ steps.versions.outputs.binutils_ver }} |
            | glibc | ${{ steps.versions.outputs.glibc_ver }} |
            | musl | ${{ steps.versions.outputs.musl_ver }} |
            | Linux 内核头文件 | ${{ steps.versions.outputs.linux_ver }} |

            ## 支持架构
            | Arch | LibC |
            |------|------|
            | riscv64 | glibc |
            | riscv64 | musl |
            | riscv32 | glibc |
            | loongarch64 | glibc |
            | aarch64 | glibc |
            | x86_64 | glibc |
          files: artifacts/*.tar.xz
          overwrite_files: true
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

